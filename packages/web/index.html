<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0A0D0E" />
    <meta
      name="description"
      content="Lifeline — an offline-first first-aid assistant. Grounded answers on-device, with peer-to-peer model delegation. No cloud."
    />
    <title>Lifeline</title>
    <!-- Set the theme before first paint so there is no flash. No network here. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("lifeline.theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
